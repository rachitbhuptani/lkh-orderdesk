<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lijjat Khaman House — Advance Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --turmeric:#E8A200; --turmeric-dark:#C78900; --green:#1E6B4E; --green-dark:#155239;
    --cream:#FBF7EE; --ink:#26221B; --muted:#7A7264; --line:#E7DFCE;
    --red:#C0392B; --amber:#B96A00; --white:#FFFFFF; --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:'Poppins',system-ui,sans-serif; background:var(--cream); color:var(--ink); font-size:15px;}
  .hidden{display:none !important;}

  /* ---------- header ---------- */
  header{background:var(--green); color:#fff; padding:14px 16px; position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;}
  header .brand{font-weight:700; font-size:16px; letter-spacing:.3px;}
  header .brand small{display:block; font-weight:400; font-size:11px; opacity:.85;}
  header button{background:rgba(255,255,255,.15); border:none; color:#fff; padding:7px 12px; border-radius:8px; font-family:inherit; font-size:13px;}

  /* ---------- login ---------- */
  #loginScreen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    background:linear-gradient(160deg, var(--green) 0%, var(--green-dark) 100%);}
  .loginCard{background:#fff; border-radius:18px; padding:32px 26px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .loginCard h1{font-size:20px; margin:0 0 4px; color:var(--green);}
  .loginCard p{margin:0 0 22px; color:var(--muted); font-size:13px;}
  .logoDot{width:52px;height:52px;border-radius:50%;background:var(--turmeric);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:22px;margin-bottom:16px;}

  /* ---------- forms ---------- */
  label{display:block; font-size:12.5px; font-weight:600; margin:14px 0 5px; color:var(--ink);}
  input,select{width:100%; padding:12px 13px; border:1.5px solid var(--line); border-radius:10px; font-family:inherit; font-size:15px; background:#fff; color:var(--ink);}
  input:focus,select:focus{outline:none; border-color:var(--turmeric);}
  .btn{display:block; width:100%; padding:14px; border:none; border-radius:12px; font-family:inherit; font-size:15.5px; font-weight:600; cursor:pointer;}
  .btn-primary{background:var(--turmeric); color:#fff;}
  .btn-primary:active{background:var(--turmeric-dark);}
  .btn-green{background:var(--green); color:#fff;}
  .btn-ghost{background:transparent; color:var(--green); border:1.5px solid var(--green);}
  .btn:disabled{opacity:.5;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  main{max-width:560px; margin:0 auto; padding:16px 14px 90px;}
  .card{background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px;}
  .card h2{margin:0 0 4px; font-size:15px; color:var(--green);}

  /* items */
  .itemRow{display:grid; grid-template-columns:1fr 64px 84px 30px; gap:8px; align-items:center; margin-bottom:8px;}
  .itemRow .del{background:none; border:none; color:var(--red); font-size:20px; padding:0;}
  .addItem{background:none; border:1.5px dashed var(--turmeric); color:var(--turmeric-dark); width:100%; padding:11px; border-radius:10px; font-family:inherit; font-weight:600; font-size:14px; margin-top:4px;}

  /* totals */
  .totals{border-top:1.5px dashed var(--line); margin-top:14px; padding-top:12px; font-size:14px;}
  .totals .tr{display:flex; justify-content:space-between; padding:3px 0;}
  .totals .grand{font-weight:700; font-size:17px; color:var(--green); border-top:1.5px solid var(--line); margin-top:6px; padding-top:8px;}
  .totals .bal{font-weight:700; color:var(--red);}

  /* tabs */
  nav{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line); display:flex; z-index:20;}
  nav button{flex:1; padding:13px 0 max(13px, env(safe-area-inset-bottom)); background:none; border:none; font-family:inherit; font-size:13.5px; font-weight:600; color:var(--muted);}
  nav button.active{color:var(--green); border-top:3px solid var(--turmeric); margin-top:-1px;}

  /* dashboard */
  .summary{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;}
  .sBox{background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 10px; text-align:center;}
  .sBox b{display:block; font-size:16px;}
  .sBox span{font-size:11px; color:var(--muted);}
  .dueStrip{background:var(--turmeric); color:#fff; border-radius:12px; padding:10px 14px; font-weight:600; font-size:13.5px; margin-bottom:14px;}
  .order{background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:12px;}
  .order .top{display:flex; justify-content:space-between; align-items:flex-start;}
  .order h3{margin:0; font-size:15px;}
  .order .inv{font-size:12px; color:var(--muted);}
  .chip{font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px;}
  .chip.PAID{background:#E4F3EC; color:var(--green);}
  .chip.PARTIAL{background:#FFF3DE; color:var(--amber);}
  .chip.UNPAID{background:#FDEBE9; color:var(--red);}
  .order .meta{font-size:13px; color:var(--muted); margin:8px 0;}
  .order .amts{display:flex; gap:14px; font-size:13.5px; flex-wrap:wrap;}
  .order .amts b{font-size:14.5px;}
  .order .acts{display:flex; gap:8px; margin-top:12px;}
  .order .acts button{flex:1; padding:9px; font-size:13px; border-radius:9px; font-weight:600; font-family:inherit; border:1.5px solid var(--line); background:#fff; color:var(--ink);}
  .order .acts .pay{border-color:var(--green); color:var(--green);}
  .payHist{font-size:12px; color:var(--muted); margin-top:8px; border-top:1px dashed var(--line); padding-top:6px;}
  .filters{display:flex; gap:6px; margin-bottom:12px; overflow-x:auto;}
  .filters button{padding:7px 14px; border-radius:20px; border:1.5px solid var(--line); background:#fff; font-family:inherit; font-size:12.5px; font-weight:600; color:var(--muted); white-space:nowrap;}
  .filters button.on{background:var(--green); border-color:var(--green); color:#fff;}

  /* modal */
  .modalBack{position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:flex-end; justify-content:center; z-index:50;}
  .modal{background:#fff; border-radius:18px 18px 0 0; padding:20px 18px 26px; width:100%; max-width:560px;}
  .modal h3{margin:0 0 4px; color:var(--green);}
  .toast{position:fixed; top:70px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:10px; font-size:13.5px; z-index:99; max-width:90%;}
  .err{color:var(--red); font-size:13px; margin-top:8px;}
  .spin{display:inline-block; width:15px; height:15px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; vertical-align:-3px;}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){ .spin{animation:none} }
</style>
</head>

        <input id="custAddr" placeholder="e.g. 12, CG Road, Ahmedabad">
        <label>Customer GSTIN (leave blank if none)</label>
        <input id="custGSTIN" style="text-transform:uppercase" placeholder="e.g. 24XXXXXXXXXXXXX">
      </div>

      <div class="card">
        <h2>Items</h2>
        <div id="itemRows"></div>
        <button class="addItem" onclick="addItemRow()">+ Add item</button>
        <div class="totals" id="totalsBox"></div>
      </div>

      <div class="card">
        <h2>Advance payment</h2>
        <div class="row2">
          <div><label>Advance received (₹)</label><input id="advance" type="number" inputmode="decimal" min="0" value="0" oninput="recalc()"></div>
          <div><label>Payment mode</label>
            <select id="payMode"><option>Cash</option><option>UPI</option><option>Card</option><option>Bank Transfer</option></select>
          </div>
        </div>
      </div>

      <div id="savedPanel" class="card hidden" style="border-color:var(--green);background:#F0F8F4">
        <h2>✅ Order saved</h2>
        <p style="margin:4px 0 12px;font-size:13.5px" id="savedInv"></p>
        <button class="btn btn-green" onclick="if(lastSaved)makePDF(lastSaved.invoiceNo,lastSaved.payload,lastSaved.calc)">⬇ Download invoice PDF</button>
      </div>
      <div id="saveErr" class="err hidden"></div>
      <button class="btn btn-primary" id="saveBtn" onclick="saveOrder()">Save order &amp; generate invoice</button>
    </section>

    <!-- ---- ORDERS DASHBOARD ---- -->
    <section id="tabOrders" class="hidden">
      <div class="summary">
        <div class="sBox"><b id="sOrders">–</b><span>Open orders</span></div>
        <div class="sBox"><b id="sPending" style="color:var(--red)">–</b><span>Pending ₹</span></div>
        <div class="sBox"><b id="sCollected" style="color:var(--green)">–</b><span>Collected ₹</span></div>
      </div>
      <div class="dueStrip hidden" id="dueStrip"></div>
      <div class="filters">
        <button class="on" data-f="OPEN" onclick="setFilter(this)">Open</button>
        <button data-f="TODAY" onclick="setFilter(this)">Due today</button>
        <button data-f="UNPAID" onclick="setFilter(this)">Payment pending</button>
        <button data-f="ALL" onclick="setFilter(this)">All</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        <input type="date" id="dateFilter" style="flex:1" onchange="renderOrders()">
        <button onclick="$('dateFilter').value='';renderOrders()" style="padding:10px 14px;border:1.5px solid var(--line);background:#fff;border-radius:10px;font-family:inherit;font-size:13px">Clear</button>
      </div>
      <div id="ordersList"><p style="text-align:center;color:var(--muted)">Loading…</p></div>
      <button class="btn btn-ghost" onclick="loadOrders()">Refresh</button>
    </section>
  </main>

  <nav>
    <button id="navNew" class="active" onclick="showTab('New')">＋ New order</button>
    <button id="navOrders" onclick="showTab('Orders')">📋 Orders</button>
  </nav>
</div>

<!-- payment modal -->
<div id="payModal" class="modalBack hidden">
  <div class="modal">
    <h3>Record payment</h3>
    <p style="margin:0;color:var(--muted);font-size:13px" id="pmInfo"></p>
    <div class="row2">
      <div><label>Amount (₹)</label><input id="pmAmt" type="number" inputmode="decimal" min="1" oninput="capPay(this)"></div>
      <div><label>Date</label><input id="pmDate" type="date"></div>
    </div>
    <label>Mode</label>
    <select id="pmMode"><option>Cash</option><option>UPI</option><option>Card</option><option>Bank Transfer</option></select>
    <div style="height:16px"></div>
    <button class="btn btn-green" onclick="submitPayment()">Save payment</button>
    <div style="height:8px"></div>
    <button class="btn btn-ghost" onclick="closePay()">Cancel</button>
  </div>
</div>

<script>
/* ---------------- state & helpers ---------------- */
let orders = [], filter = "OPEN", payingInv = null, lastSaved = null;
const $ = id => document.getElementById(id);
const inr = n => "₹" + Number(n).toLocaleString("en-IN", {maximumFractionDigits:2});
const today = () => new Date().toISOString().slice(0,10);
const fmtD = s => { if(!s) return ""; const d=new Date(s); return isNaN(d)?s:d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}); };
function toast(m){ const t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2600); }

/* ---------------- login ---------------- */
window.addEventListener("DOMContentLoaded",()=>{ if(LOGO_BASE64) $("loginLogo").src=LOGO_BASE64; });
function doLogin(){
  if($("lu").value.trim()===LOGIN_USER && $("lp").value===LOGIN_PASS){
    sessionStorage.setItem("lkh_auth","1"); enterApp();
  } else $("lerr").classList.remove("hidden");
}
function logout(){ sessionStorage.removeItem("lkh_auth"); location.reload(); }
function enterApp(){
  $("loginScreen").classList.add("hidden"); $("app").classList.remove("hidden");
  $("orderDate").value = today(); addItemRow(); loadOrders();
}
if(sessionStorage.getItem("lkh_auth")==="1") window.addEventListener("DOMContentLoaded", enterApp);

/* ---------------- item rows ---------------- */
function addItemRow(){
  const div = document.createElement("div"); div.className="itemRow";
  const opts = ITEMS.map(i=>`<option data-rate="${i.rate}">${i.name}</option>`).join("");
  div.innerHTML = `
    <select onchange="pickItem(this)"><option value="">— select item —</option><option value="__other">✏️ Type item name</option>${opts}</select>
    <input type="number" placeholder="Qty" min="0" step="0.25" inputmode="decimal" oninput="recalc()">
    <input type="number" placeholder="Rate ₹" min="0" inputmode="decimal" oninput="recalc()">
    <button class="del" onclick="this.parentNode.remove();recalc()">✕</button>`;
  $("itemRows").appendChild(div); recalc();
}
function pickItem(sel){
  const row = sel.parentNode;
  if(sel.value==="__other"){
    const inp=document.createElement("input"); inp.placeholder="Item name"; inp.oninput=recalc; row.replaceChild(inp,sel); inp.focus();
  } else {
    const r = sel.selectedOptions[0].dataset.rate;
    if(r && Number(r)>0) row.children[2].value=r;
  }
  recalc();
}
function readItems(){
  const rows=[...document.querySelectorAll(".itemRow")], items=[];
  rows.forEach(r=>{
    const nameEl=r.children[0];
    const name = nameEl.tagName==="SELECT" ? nameEl.value : nameEl.value.trim();
    const qty=Number(r.children[1].value), rate=Number(r.children[2].value);
    if(name && name!=="__other" && qty>0 && rate>0) items.push({name, qty, rate, amount:+(qty*rate).toFixed(2)});
  });
  return items;
}

/* ---------------- GST math (prices inclusive of 5%) ---------------- */
function taxMode(){ return "intra"; }
function calc(items, advance){
  const total = items.reduce((s,i)=>s+i.amount,0);
  const taxable = total/1.05, tax = total-taxable;
  const rounded = Math.round(total);
  let roundOff = +(rounded-total).toFixed(2);
  if(Math.abs(roundOff)>20) roundOff=0;
  const grand = total+roundOff;
  return {total:+total.toFixed(2), taxable:+taxable.toFixed(2), tax:+tax.toFixed(2),
          roundOff, grand:+grand.toFixed(2), balance:+(grand-(advance||0)).toFixed(2), mode:taxMode()};
}
function recalc(){
  const items=readItems(), adv=Number($("advance")?.value||0), c=calc(items,adv);
  const taxRows = `<div class="tr"><span>CGST @ 2.5%</span><span>${inr(c.tax/2)}</span></div>
       <div class="tr"><span>SGST @ 2.5%</span><span>${inr(c.tax/2)}</span></div>`;
  $("totalsBox").innerHTML = items.length ? `
    <div class="tr"><span>Taxable value</span><span>${inr(c.taxable)}</span></div>
    ${taxRows}
    <div class="tr"><span>Round off</span><span>${c.roundOff>=0?"+":""}${c.roundOff.toFixed(2)}</span></div>
    <div class="tr grand"><span>Grand total</span><span>${inr(c.grand)}</span></div>
    <div class="tr"><span>Advance</span><span>− ${inr(adv)}</span></div>
    <div class="tr bal"><span>Balance due</span><span>${inr(Math.max(c.balance,0))}</span></div>`
    : `<p style="color:var(--muted);font-size:13px;margin:6px 0 0">Add at least one item.</p>`;
}

/* ---------------- save order ---------------- */
async function saveOrder(){
  const items=readItems(), name=$("custName").value.trim(), del=$("deliveryDate").value;
  const err=$("saveErr"); err.classList.add("hidden"); $("savedPanel").classList.add("hidden");
  if(!name||!del||!items.length){
    err.textContent="Customer name, delivery date and at least one complete item are required.";
    err.classList.remove("hidden"); return;
  }
  const adv=Number($("advance").value||0), c=calc(items,adv);
  if(adv>c.grand){ err.textContent="Advance cannot be more than the grand total."; err.classList.remove("hidden"); return; }
  const btn=$("saveBtn"); btn.disabled=true; btn.innerHTML='<span class="spin"></span> Saving…';
  const payload={action:"createOrder", orderDate:$("orderDate").value||today(), deliveryDate:del,
    customerName:name, customerPhone:$("custPhone").value.trim(), customerAddress:$("custAddr").value.trim(), customerGSTIN:$("custGSTIN").value.trim().toUpperCase(),
    items, total:c.grand, advance:adv, paymentMode:$("payMode").value, taxMode:c.mode};
  try{
    const res=await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)});
    const raw=await res.text();
    let data;
    try{ data=JSON.parse(raw); }
    catch(_){ throw new Error("The Google Script did not respond correctly. Open SETUP-GUIDE Part 1: redeploy the Web App with access = Anyone, and paste the NEW /exec URL into index.html"); }
    if(!data.ok) throw new Error(data.error||"Server error");
    lastSaved={invoiceNo:data.invoiceNo, payload, calc:c};
    $("savedInv").textContent=data.invoiceNo+" saved for "+payload.customerName;
    $("savedPanel").classList.remove("hidden");
    makePDF(data.invoiceNo, payload, c);
    toast("Saved as "+data.invoiceNo);
    document.querySelectorAll(".itemRow").forEach(r=>r.remove()); addItemRow();
    ["custName","custPhone","custAddr","custGSTIN"].forEach(i=>$(i).value="");
    $("advance").value=0; $("deliveryDate").value=""; recalc();
    loadOrders();
  }catch(e){
    err.textContent="Could not save: "+e.message+". Check internet / SCRIPT_URL."; err.classList.remove("hidden");
  }finally{ btn.disabled=false; btn.textContent="Save order & generate invoice"; }
}

/* ---------------- PDF invoice ---------------- */
function amountInWords(n){
  n=Math.round(n);
  const a=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  const two=x=>x<20?a[x]:b[Math.floor(x/10)]+(x%10?" "+a[x%10]:"");
  const three=x=>(x>99?a[Math.floor(x/100)]+" Hundred"+(x%100?" ":""):"")+(x%100?two(x%100):"");
  if(n===0) return "Zero";
  let s="", cr=Math.floor(n/1e7); n%=1e7; let lk=Math.floor(n/1e5); n%=1e5; let th=Math.floor(n/1e3); n%=1e3;
  if(cr) s+=three(cr)+" Crore ";
  if(lk) s+=three(lk)+" Lakh ";
  if(th) s+=three(th)+" Thousand ";
  if(n) s+=three(n);
  return s.trim();
}
function makePDF(invNo, p, c){
  const {jsPDF}=window.jspdf; const d=new jsPDF({unit:"mm",format:"a4"});
  const W=210, M=16; let y=18;
  const GREEN=[30,107,78], GREY=[130,130,130], DARK=[40,40,40];

  // ---- header: logo left, TAX INVOICE right ----
  if(LOGO_BASE64){ try{ d.addImage(LOGO_BASE64,"PNG",M,y-6,30,29); }catch(e){} }
  d.setFont("helvetica","normal").setFontSize(24).setTextColor(...GREEN);
  d.text("TAX INVOICE", W-M, y+2, {align:"right"});
  d.setFont("helvetica","bold").setFontSize(11).setTextColor(...DARK);
  d.text("# "+invNo, W-M, y+9, {align:"right"});
  d.setFontSize(9).setTextColor(...GREY);
  d.text("Balance Due", W-M, y+18, {align:"right"});
  d.setFont("helvetica","bold").setFontSize(12).setTextColor(...DARK);
  d.text("Rs. "+Math.max(c.balance,0).toFixed(2), W-M, y+24, {align:"right"});

  // ---- company block ----
  y+=32;
  d.setFont("helvetica","bold").setFontSize(10).setTextColor(...DARK);
  d.text("Lijjat Khaman House", M, y); y+=4.6;
  d.setFont("helvetica","normal").setFontSize(8.8);
  ["Lijjat Khaman House, Near Passport Office, Opp. metro pillar no. 162",
   "Vijay crossroad, Navrangpura",
   "Ahmedabad Gujarat 380009",
   "India",
   "GSTIN "+CO.gstin,
   CO.email].forEach(l=>{ d.text(l, M, y); y+=4.2; });
  y+=4;

  // ---- Bill To (left) + invoice meta (right) ----
  const metaY=y;
  d.setFontSize(9).setTextColor(...GREY);
  d.text("Bill To", M, y); y+=4.8;
  d.setFont("helvetica","bold").setFontSize(9.5).setTextColor(...DARK);
  const billLines=[p.customerName, p.customerAddress||null,
    p.customerPhone?("Ph: "+p.customerPhone):null,
    p.customerGSTIN?("GSTIN: "+p.customerGSTIN):null].filter(Boolean);
  billLines.forEach(l=>{ d.splitTextToSize(l, 90).forEach(t=>{ d.text(t,M,y); y+=4.6; }); });

  let my=metaY;
  const meta=(k,v)=>{ d.setFont("helvetica","normal").setTextColor(...GREY).setFontSize(9); d.text(k, W-M-58, my);
    d.setTextColor(...DARK); d.text(v, W-M, my, {align:"right"}); my+=5.4; };
  meta("Invoice Date :", fmtSlash(p.orderDate));
  meta("Terms :", "Due on Receipt");
  meta("Due Date :", fmtSlash(p.deliveryDate));
  y=Math.max(y,my)+4;

  d.setFont("helvetica","normal").setFontSize(9).setTextColor(...DARK);
  d.text("Place Of Supply: Gujarat (24)", M, y); y+=6;

  // ---- items table ----
  // columns: # | Item & Description | HSN/SAC | Qty | Rate | CGST | SGST | Amount
  const cx={n:M+2, item:M+10, hsn:M+78, qty:M+102, rate:M+120, cgst:M+142, sgst:M+160, amt:W-M-2};
  d.setFillColor(...GREEN); d.rect(M, y, W-2*M, 8, "F");
  d.setFont("helvetica","bold").setFontSize(8.6).setTextColor(255);
  const hy=y+5.4;
  d.text("#",cx.n,hy); d.text("Item & Description",cx.item,hy); d.text("HSN/SAC",cx.hsn,hy);
  d.text("Qty",cx.qty+8,hy,{align:"right"}); d.text("Rate",cx.rate+12,hy,{align:"right"});
  d.text("CGST",cx.cgst+8,hy,{align:"right"}); d.text("SGST",cx.sgst+8,hy,{align:"right"});
  d.text("Amount",cx.amt,hy,{align:"right"});
  y+=12;

  let subTotal=0, cgstT=0, sgstT=0;
  d.setTextColor(...DARK);
  p.items.forEach((it,i)=>{
    const rateEx=it.rate/1.05, lineTax=it.qty*rateEx, half=lineTax*0.025;
    subTotal+=lineTax; cgstT+=half; sgstT+=half;
    d.setFont("helvetica","normal").setFontSize(9);
    d.text(String(i+1),cx.n,y);
    d.text(it.name.slice(0,34),cx.item,y);
    d.text(it.hsn||"21069099",cx.hsn,y);
    d.text(it.qty.toFixed(2),cx.qty+8,y,{align:"right"});
    d.text(rateEx.toFixed(3),cx.rate+12,y,{align:"right"});
    d.text(half.toFixed(2),cx.cgst+8,y,{align:"right"});
    d.text(half.toFixed(2),cx.sgst+8,y,{align:"right"});
    d.text(lineTax.toFixed(2),cx.amt,y,{align:"right"});
    d.setFontSize(7.2).setTextColor(...GREY);
    d.text("2.5%",cx.cgst+8,y+3.4,{align:"right"});
    d.text("2.5%",cx.sgst+8,y+3.4,{align:"right"});
    d.setTextColor(...DARK);
    y+=9.5;
    d.setDrawColor(228).setLineWidth(.2).line(M,y-3.2,W-M,y-3.2);
    if(y>240){ d.addPage(); y=20; }
  });
  y+=4;

  // ---- totals block (right) ----
  const total=subTotal+cgstT+sgstT;
  const grand=c.grand, roundOff=+(grand-total).toFixed(2);
  const kX=W-M-70, vX=W-M-2;
  const trow=(k,v,bold,big)=>{
    d.setFont("helvetica",bold?"bold":"normal").setFontSize(big?11:9.5);
    d.setTextColor(...(bold?DARK:GREY)); d.text(k,kX,y);
    d.setTextColor(...DARK); d.text(v,vX,y,{align:"right"}); y+=big?8:6.5;
  };
  trow("Sub Total", subTotal.toFixed(2));
  trow("CGST2.5 (2.5%)", cgstT.toFixed(2));
  trow("SGST2.5 (2.5%)", sgstT.toFixed(2));
  trow("Round Off", roundOff.toFixed(2));
  d.setDrawColor(200).line(kX-2,y-4,W-M,y-4); y+=1;
  trow("Total", "Rs. "+grand.toFixed(2), true, true);
  if(Number(p.advance||0)>0) trow("Amount Paid", "Rs. "+Number(p.advance).toFixed(2));
  d.setFillColor(243,243,243); d.rect(kX-4,y-4.5,(W-M)-(kX-4),8,"F");
  trow("Balance Due", "Rs. "+Math.max(c.balance,0).toFixed(2), true);
  y+=4;

  // ---- amount in words ----
  d.setFont("helvetica","normal").setFontSize(9).setTextColor(...GREY);
  d.text("Total In Words:", M, y);
  d.setFont("helvetica","bolditalic").setTextColor(...DARK);
  d.splitTextToSize("Indian Rupee "+amountInWords(grand)+" Only", 105).forEach(t=>{ d.text(t, M+70, y); y+=5; });
  y+=8;

  // ---- notes + footer ----
  d.setFont("helvetica","normal").setFontSize(9).setTextColor(...GREY);
  d.text("Notes", M, y); y+=4.6;
  d.setTextColor(...DARK); d.text("Thanks for your business.", M, y);
  d.setFont("helvetica","italic").setFontSize(8.5).setTextColor(120);
  d.text("This is a computer-generated invoice and does not require a signature.", M, 285);
  d.save(invNo+".pdf");
}
function fmtSlash(s){ const d=new Date(s); return isNaN(d)?s:String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear(); }

/* ---------------- dashboard ---------------- */
let loading=false;
async function loadOrders(){
  if(loading) return; loading=true;
  try{
    const res=await fetch(SCRIPT_URL+"?action=list");
    const data=await res.json();
    orders=(data.orders||[]).reverse();
    renderOrders();
  }catch(e){
    if(!orders.length) $("ordersList").innerHTML='<p class="err">Could not load orders. Check internet / SCRIPT_URL.</p>';
  }finally{ loading=false; }
}
function setFilter(btn){ filter=btn.dataset.f; document.querySelectorAll(".filters button").forEach(b=>b.classList.toggle("on",b===btn)); renderOrders(); }
function renderOrders(){
  const t=today();
  const open=orders.filter(o=>o.Delivered!=="YES"||Number(o.Balance)>0);
  $("sOrders").textContent=open.length;
  $("sPending").textContent=inr(orders.reduce((s,o)=>s+Math.max(Number(o.Balance),0),0));
  $("sCollected").textContent=inr(orders.reduce((s,o)=>s+Number(o.TotalPaid||0),0));
  const dueToday=orders.filter(o=>String(o.DeliveryDate).slice(0,10)===t && o.Delivered!=="YES");
  $("dueStrip").classList.toggle("hidden", !dueToday.length);
  if(dueToday.length) $("dueStrip").textContent="🔔 "+dueToday.length+" order(s) due for delivery today";

  let list=orders;
  if(filter==="OPEN") list=open;
  if(filter==="TODAY") list=dueToday;
  if(filter==="UNPAID") list=orders.filter(o=>Number(o.Balance)>0);
  const df=$("dateFilter").value;
  if(df) list=list.filter(o=>String(o.DeliveryDate).slice(0,10)===df || String(o.OrderDate).slice(0,10)===df);
  $("ordersList").innerHTML = list.length ? list.map(cardHTML).join("") :
    '<p style="text-align:center;color:var(--muted);padding:20px 0">No orders here.</p>';
}
function cardHTML(o){
  const hist=(o.Payments||[]).map(p=>`${fmtD(p.date)} · ${inr(p.amount)} (${p.mode})`).join("<br>");
  return `<div class="order">
    <div class="top">
      <div><h3>${o.CustomerName}</h3><div class="inv">${o.InvoiceNo}${o.CustomerPhone?" · "+o.CustomerPhone:""}</div></div>
      <span class="chip ${o.Status}">${o.Status==="PAID"?"Fully paid":o.Status==="PARTIAL"?"Partially paid":"Unpaid"}</span>
    </div>
    <div class="meta">Delivery: <b>${fmtD(o.DeliveryDate)}</b>${o.Delivered==="YES"?" · ✅ Delivered":""}</div>
    <div class="amts">
      <span>Total <b>${inr(o.Total)}</b></span>
      <span>Paid <b style="color:var(--green)">${inr(o.TotalPaid)}</b></span>
      <span>Balance <b style="color:${Number(o.Balance)>0?'var(--red)':'var(--green)'}">${inr(o.Balance)}</b></span>
    </div>
    ${hist?`<div class="payHist">${hist}</div>`:""}
    <div class="acts">
      ${Number(o.Balance)>0?`<button class="pay" onclick="openPay('${o.InvoiceNo}')">+ Payment</button>`:""}
      ${o.Delivered!=="YES"?`<button onclick="markDelivered('${o.InvoiceNo}')">Mark delivered</button>`:""}
      <button onclick="reInvoice('${o.InvoiceNo}')">Invoice ⬇</button>
    </div>
  </div>`;
}
function openPay(inv){
  payingInv=inv; const o=orders.find(x=>x.InvoiceNo===inv);
  $("pmInfo").textContent=inv+" · "+o.CustomerName+" · Balance "+inr(o.Balance);
  $("pmAmt").value=o.Balance; $("pmDate").value=today();
  $("payModal").classList.remove("hidden");
}
function capPay(inp){ const o=orders.find(x=>x.InvoiceNo===payingInv); if(o && Number(inp.value)>Number(o.Balance)) inp.value=o.Balance; }
function closePay(){ $("payModal").classList.add("hidden"); }
async function submitPayment(){
  const amt=Number($("pmAmt").value);
  if(!amt||amt<=0) return toast("Enter a valid amount");
  const o=orders.find(x=>x.InvoiceNo===payingInv);
  if(o && amt>Number(o.Balance)+0.01) return toast("Amount cannot exceed pending balance of "+inr(o.Balance));
  try{
    const res=await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"addPayment",invoiceNo:payingInv,amount:amt,date:$("pmDate").value,mode:$("pmMode").value})});
    const data=await res.json();
    if(!data.ok) throw new Error(data.error);
    closePay(); toast("Payment saved"); loadOrders();
  }catch(e){ toast("Failed: "+e.message); }
}
async function markDelivered(inv){
  try{
    await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"markDelivered",invoiceNo:inv})});
    toast("Marked delivered"); loadOrders();
  }catch(e){ toast("Failed"); }
}
function reInvoice(inv){
  const o=orders.find(x=>x.InvoiceNo===inv);
  const items=o.Items;
  const total=items.reduce((s,i)=>s+i.amount,0);
  const taxable=total/1.05, tax=total-taxable;
  const c={taxable:+taxable.toFixed(2), tax:+tax.toFixed(2), roundOff:+(Number(o.Total)-total).toFixed(2),
    grand:Number(o.Total), balance:Number(o.Balance), mode:o.TaxMode||"intra"};
  makePDF(inv,{orderDate:o.OrderDate,deliveryDate:o.DeliveryDate,customerName:o.CustomerName,
    customerPhone:o.CustomerPhone,customerAddress:o.CustomerAddress,customerGSTIN:o.CustomerGSTIN,items,advance:o.TotalPaid},c);
}

/* ---------------- tabs ---------------- */
function showTab(t){
  $("tabNew").classList.toggle("hidden",t!=="New");
  $("tabOrders").classList.toggle("hidden",t!=="Orders");
  $("navNew").classList.toggle("active",t==="New");
  $("navOrders").classList.toggle("active",t==="Orders");
  if(t==="Orders"){ if(orders.length) renderOrders(); loadOrders(); }
}
</script>
